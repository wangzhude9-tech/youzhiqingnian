name: Build Android APK

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check and fix folder structure
        run: |
          echo "当前目录："
          ls -la
          
          # 如果 mobile-app 存在，移动所有文件到根目录
          if [ -d "mobile-app" ]; then
            echo "发现 mobile-app 文件夹，正在移动文件..."
            mv mobile-app/* ./
            mv mobile-app/.* ./ 2>/dev/null || true
            rmdir mobile-app 2>/dev/null || true
            echo "移动完成："
            ls -la
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
